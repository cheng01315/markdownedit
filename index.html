<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown编辑器</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- 自定义CSS -->
    <link rel="stylesheet" href="/style.css">
    <!-- 代码高亮库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github.min.css" id="highlight-light">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github-dark.min.css" id="highlight-dark" disabled>
</head>
<body class="bg-gray-100 dark:bg-gray-900 transition-colors duration-300">
    <div class="min-h-screen flex flex-col">
        <!-- 顶部导航栏 -->
        <header class="bg-white dark:bg-gray-800 shadow-md">
            <div class="container mx-auto px-4 py-3 flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <h1 class="text-xl font-bold text-gray-800 dark:text-white">
                        <i class="fa fa-markdown mr-2"></i>Markdown编辑器
                    </h1>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                        <i class="fa fa-moon-o dark:hidden text-gray-600"></i>
                        <i class="fa fa-sun-o hidden dark:block text-yellow-300"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- 工具栏 -->
        <div class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700">
            <div class="container mx-auto px-4">
                <div class="flex flex-wrap py-2 gap-1" id="toolbar">
                    <button class="toolbar-btn" data-command="heading" data-value="1" title="一级标题">
                        <i class="fa fa-header"></i><span class="ml-1">H1</span>
                    </button>
                    <button class="toolbar-btn" data-command="heading" data-value="2" title="二级标题">
                        <i class="fa fa-header"></i><span class="ml-1">H2</span>
                    </button>
                    <button class="toolbar-btn" data-command="heading" data-value="3" title="三级标题">
                        <i class="fa fa-header"></i><span class="ml-1">H3</span>
                    </button>
                    <div class="h-6 border-r border-gray-300 dark:border-gray-600 mx-1"></div>
                    <button class="toolbar-btn" data-command="bold" title="粗体">
                        <i class="fa fa-bold"></i>
                    </button>
                    <button class="toolbar-btn" data-command="italic" title="斜体">
                        <i class="fa fa-italic"></i>
                    </button>
                    <button class="toolbar-btn" data-command="strikethrough" title="删除线">
                        <i class="fa fa-strikethrough"></i>
                    </button>
                    <div class="h-6 border-r border-gray-300 dark:border-gray-600 mx-1"></div>
                    <button class="toolbar-btn" data-command="ul" title="无序列表">
                        <i class="fa fa-list-ul"></i>
                    </button>
                    <button class="toolbar-btn" data-command="ol" title="有序列表">
                        <i class="fa fa-list-ol"></i>
                    </button>
                    <button class="toolbar-btn" data-command="quote" title="引用">
                        <i class="fa fa-quote-right"></i>
                    </button>
                    <button class="toolbar-btn" data-command="code" title="代码块">
                        <i class="fa fa-code"></i>
                    </button>
                    <div class="h-6 border-r border-gray-300 dark:border-gray-600 mx-1"></div>
                    <button class="toolbar-btn" data-command="link" title="链接">
                        <i class="fa fa-link"></i>
                    </button>
                    <button class="toolbar-btn" data-command="image" title="图片">
                        <i class="fa fa-image"></i>
                    </button>
                    <div class="h-6 border-r border-gray-300 dark:border-gray-600 mx-1"></div>
                    <button class="toolbar-btn" data-command="table" title="表格">
                        <i class="fa fa-table"></i>
                    </button>
                    <button class="toolbar-btn" data-command="hr" title="分隔线">
                        <i class="fa fa-minus"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- 主内容区 -->
        <main class="flex-1 flex flex-col md:flex-row">
            <!-- 编辑区 -->
            <div class="w-full md:w-1/2 border-r border-gray-300 dark:border-gray-700">
                <div class="h-full flex flex-col">
                    <div class="bg-gray-50 dark:bg-gray-800 px-4 py-2 border-b border-gray-300 dark:border-gray-700 flex justify-between items-center">
                        <h2 class="font-medium text-gray-700 dark:text-gray-300">编辑区</h2>
                        <div class="flex space-x-2">
                            <button id="clear-btn" class="text-sm px-2 py-1 bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 rounded text-gray-700 dark:text-gray-300 transition-colors">
                                清空
                            </button>
                            <button id="sample-btn" class="text-sm px-2 py-1 bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 rounded text-gray-700 dark:text-gray-300 transition-colors">
                                示例
                            </button>
                        </div>
                    </div>
                    <textarea id="editor" class="flex-1 p-4 font-mono text-sm bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200 focus:outline-none resize-none" placeholder="在此输入Markdown内容..."></textarea>
                </div>
            </div>

            <!-- 预览区 -->
            <div class="w-full md:w-1/2">
                <div class="h-full flex flex-col">
                    <div class="bg-gray-50 dark:bg-gray-800 px-4 py-2 border-b border-gray-300 dark:border-gray-700 flex justify-between items-center">
                        <h2 class="font-medium text-gray-700 dark:text-gray-300">预览区</h2>
                        <div class="flex space-x-2">
                            <button id="copy-btn" class="text-sm px-2 py-1 bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 rounded text-gray-700 dark:text-gray-300 transition-colors">
                                复制
                            </button>
                            <div class="relative">
                                <button id="export-btn" class="text-sm px-2 py-1 bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 rounded text-gray-700 dark:text-gray-300 transition-colors">
                                    导出 <i class="fa fa-caret-down ml-1"></i>
                                </button>
                                <div id="export-menu" class="absolute right-0 mt-1 bg-white dark:bg-gray-700 shadow-lg rounded-md hidden z-10">
                                    <ul>
                                        <li>
                                            <a href="#" id="export-md" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-600">
                                                <i class="fa fa-file-text-o mr-2"></i>Markdown (.md)
                                            </a>
                                        </li>
                                        <li>
                                            <a href="#" id="export-html" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-600">
                                                <i class="fa fa-file-code-o mr-2"></i>HTML (.html)
                                            </a>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div id="preview" class="flex-1 p-4 overflow-auto bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200"></div>
                </div>
            </div>
        </main>

        <!-- 底部状态栏 -->
        <footer class="bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 py-2">
            <div class="container mx-auto px-4 flex justify-between items-center text-sm text-gray-600 dark:text-gray-400">
                <div id="word-count">字数: 0</div>
                <div id="auto-save-status">已自动保存</div>
            </div>
        </footer>
    </div>

    <!-- 引入外部JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <script src="/script.js"></script>
</body>
</html>
